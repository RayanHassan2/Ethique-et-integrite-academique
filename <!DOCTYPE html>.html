<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz EIA - UMF Iași</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --correct-color: #28a745;
            --incorrect-color: #dc3545;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
        }

        .question-counter {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--secondary-color);
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--correct-color);
            color: #155724;
        }

        .option-btn.incorrect {
            background-color: #f8d7da;
            border-color: var(--incorrect-color);
            color: #721c24;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        .next-btn:hover {
            background-color: #004494;
        }

        .score-container {
            text-align: center;
            display: none;
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Éthique et Intégrité Académique</h1>
    
    <div id="quiz-block">
        <div class="question-counter" id="question-counter">Question 1 / 102</div>
        <div class="question-text" id="question-text">Chargement...</div>
        <div class="options" id="options-container"></div>
        <div class="controls">
            <div id="feedback-msg" style="font-weight: bold;"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Suivant ➔</button>
        </div>
    </div>

    <div class="score-container" id="score-block">
        <div class="score-text">Score final : <span id="final-score">0</span> / <span id="total-questions">0</span></div>
        <button class="restart-btn" onclick="restartQuiz()">Recommencer l'entraînement</button>
    </div>
</div>

<script>
    const questionsData = [
        {
            question: "Un étudiant en médecine insère, mot pour mot, un paragraphe tiré d'un e-mail du coordinateur de stage dans un rapport, sans en indiquer la source. De quoi s'agit-il ?",
            options: ["A. Acceptable (communication interne)", "B. Plagiat textuel", "C. Simple erreur de style", "D. Auto-plagiat", "E. Réutilisation légitime"],
            correctIndex: 1
        },
        {
            question: "Une résidente reprend l'idée originale d'un collègue concernant un algorithme de triage dans le SAU et la présente comme « sienne » dans un travail. Comment s'appelle cette infraction ?",
            options: ["A. Plagiat textuel", "B. Vol d'idées", "C. Auto-plagiat", "D. Fraude avec des données", "E. Ce n'est pas une infraction"],
            correctIndex: 1
        },
        {
            question: "Un étudiant « réécrit » un paragraphe d'un article de cardiologie en remplaçant quelques mots par des synonymes, sans citer ses sources. Comment qualifier cet acte ?",
            options: ["A. Résumé correct", "B. Traduction acceptable", "C. Paraphrase inappropriée (patchwriting)", "D. Auto-plagiat", "E. Citation correcte"],
            correctIndex: 2
        },
        {
            question: "Le texte mentionne (Bouvard, 2022), mais Bouvard ne figure pas dans la liste des références. Quel est le problème ?",
            options: ["A. Plagiat intentionnel", "B. Tout est en ordre", "C. Erreur de citation et de référencement", "D. Auto-plagiat", "E. Salami-slicing"],
            correctIndex: 2
        },
        {
            question: "Un étudiant copie un guide de soins des plaies sur le blog de l'hôpital et l'inclut dans son projet sans le citer. Il s'agit de :",
            options: ["A. Domaine public", "B. Simple information", "C. Citation correcte", "D. Données ouvertes", "E. Plagiat textuel du contenu numérique"],
            correctIndex: 4
        },
        {
            question: "Un étudiant utilise un « outil de paraphrase » pour contourner Turnitin, en conservant les idées d'un article sans les citer. Selon le cours, il s'agit :",
            options: ["A. Création légitime", "B. Une aide éditoriale acceptable", "C. Plagiat (absence d'attribution de la source)", "D. Auto-plagiat", "E. Simple erreur mineure"],
            correctIndex: 2
        },
        {
            question: "Une collègue scanne un livre rare, utilise un logiciel de reconnaissance optique de caractères (ROC) pour pouvoir copier des passages dans son essai, sans mentionner la source. De quel type d'infraction s'agit-il ?",
            options: ["A. Traduction frauduleuse", "B. Auto-plagiat", "C. Plagiat d'idées", "D. Vol de données", "E. Variante du « copier-coller » (plagiat)"],
            correctIndex: 4
        },
        {
            question: "Un étudiant recopie une thèse imprimée (non numérisable) et l'insère dans son travail sans la citer. Est-ce :",
            options: ["A. Acceptable (il n'a pas fait de copier-coller)", "B. Il s'agit uniquement de notes personnelles", "C. Une transcription non attribuée = du plagiat", "D. Auto-plagiat", "E. Utilisation équitable à des fins académiques"],
            correctIndex: 2
        },
        {
            question: "Vous reprenez, par transcription automatique, 2 minutes d'une vidéo de cours du professeur et vous les insérez dans votre rapport sans les citer. Est-ce :",
            options: ["A. OK ; « l'oral » ne se cite pas", "B. Plagiat d'idées", "C. Simple erreur technique", "D. Plagiat textuel (contenu transcrit)", "E. Domaine public"],
            correctIndex: 3
        },
        {
            question: "Vous résumez la section « Méthodes » d'un article scientifique, mais vous n'indiquez aucune source. Il s'agit :",
            options: ["A. Résumé original", "B. Traduction acceptable", "C. Plagiat par paraphrase sans attribution", "D. Auto-plagiat", "E. Erreur mineure"],
            correctIndex: 2
        },
        {
            question: "Un étudiant traduit intégralement en roumain une critique écrite en anglais et la remet comme son propre travail. Comment appelle-t-on cela ?",
            options: ["A. Auto-plagiat", "B. Traduction acceptable", "C. Plagiat par traduction", "D. Simple aide à la rédaction", "E. Utilisation équitable"],
            correctIndex: 2
        },
        {
            question: "Une résidente achète un essai en espagnol sur l'éthique médicale, le traduit et le remet. Il s'agit :",
            options: ["A. Partage académique", "B. Plagiat d'idées", "C. Une fraude contractuelle + une traduction frauduleuse", "D. Auto-plagiat", "E. Acceptable avec auto-citation"],
            correctIndex: 2
        },
        {
            question: "Quand la traduction est-elle acceptable dans votre travail ?",
            options: ["A. À tout moment, si le texte est très court", "B. Seulement si personne ne le remarque", "C. Lorsque vous traduisez, vous indiquez qu'il s'agit d'une traduction personnelle et vous citez la source originale", "D. Uniquement dans les Conclusions", "E. Lors des examens"],
            correctIndex: 2
        },
        {
            question: "Selon le cours, le plagiat devient « intentionnel » lorsque...",
            options: ["A. L'étudiant est en troisième année", "B. Il existe de réelles opportunités d'apprendre comment l'éviter (attentes, formation explicite)", "C. La note est faible", "D. Le travail est court", "E. Le sujet est difficile"],
            correctIndex: 1
        },
        {
            question: "Le « patchwriting » chez les débutants peut être :",
            options: ["A. Toujours une fraude grave", "B. Seulement désagréable sur le plan stylistique", "C. Parfois une stratégie transitoire associée à un plagiat involontaire", "D. De l'auto-plagiat", "E. Sans importance sur le plan éthique"],
            correctIndex: 2
        },
        {
            question: "Afin de réduire le plagiat involontaire dans un cours clinique, l'enseignant devrait d'abord :",
            options: ["A. Augmenter les sanctions", "B. N'utiliser que des tests à choix multiples", "C. Donner une formation explicite sur la citation/paraphrase", "D. Interdire la bibliographie", "E. Accepter n'importe quel résumé"],
            correctIndex: 2
        },
        {
            question: "Quelle affirmation est correcte concernant le risque individuel de plagiat ?",
            options: ["A. L'année d'études est un facteur prédictif important", "B. La maturité peut réduire le risque, même dans les premières années", "C. Les notes élevées augmentent la reconnaissance de la fraude", "D. La personnalité n'a pas d'importance", "E. La maîtrise de soi n'a aucun rapport"],
            correctIndex: 1
        },
        {
            question: "Quel étudiant est le plus exposé au risque de fraude ?",
            options: ["A. Celui qui connaît bien les règles de l'établissement", "B. Les étudiants internationaux, qui ont une maîtrise limitée de la langue et ne connaissent pas les attentes", "C. Tuteur en rédaction académique", "D. Diplômé du même programme", "E. Sans accès à Internet"],
            correctIndex: 1
        },
        {
            question: "Dans une faculté avec un code d'honneur actif :",
            options: ["A. Les infractions ont tendance à être moins nombreuses", "B. Les infractions augmentent", "C. Cela n'a pas d'importance", "D. Seul le plagiat diminue", "E. Ce n'est qu'une tricherie"],
            correctIndex: 0
        },
        {
            question: "Les courbes strictes de notation compétitive ont tendance à :",
            options: ["A. Diminuer la fraude", "B. N'avoir aucun impact", "C. Encourager les comportements inappropriés", "D. Éliminer le plagiat d'idées", "E. Mettre fin au salami-slicing"],
            correctIndex: 2
        },
        {
            question: "L'indifférence institutionnelle face à la fraude transmet :",
            options: ["A. Un message de tolérance zéro", "B. Une approbation tacite", "C. Rien", "D. Un risque réduit", "E. Seulement une augmentation de plagiat"],
            correctIndex: 1
        },
        {
            question: "L'étudiant soumet le même travail en éthique et en méthodologie, sans en informer les professeurs. Est-ce :",
            options: ["A. Acceptable s'il s'agit de son propre travail", "B. Auto-plagiat", "C. Plagiat d'idées", "D. Une simple erreur de formatage", "E. Du salami-slicing"],
            correctIndex: 1
        },
        {
            question: "À propos du « salami-slicing » (publication partielle à partir du même ensemble de données), le cours affirme que :",
            options: ["A. C'est toujours éthique", "B. Il est toujours interdit", "C. C'est un phénomène similaire à l'auto-plagiat ; certains l'acceptent sous conditions, d'autres recommandent de l'éviter", "D. Il n'existe qu'en musicologie", "E. Cela signifie l'absence de bibliographie"],
            correctIndex: 2
        },
        {
            question: "La répétition extensive de la section « Méthodes » dans plusieurs articles de la même étude peut :",
            options: ["A. Être ignorée par le logiciel", "B. N'avoir aucune conséquence", "C. Susciter des soupçons d'auto-plagiat et entraîner un rejet", "D. Être obligatoire", "E. Remplacer les résultats"],
            correctIndex: 2
        },
        {
            question: "Comment un étudiant peut-il éviter l'auto-plagiat lorsqu'il développe un sujet déjà traité auparavant ?",
            options: ["A. Ne rien dire", "B. Cacher ses sources", "C. Inclure une brève reconnaissance concernant le cours/les travaux antérieurs", "D. Répéter mot pour mot le texte", "E. Ne changer que les synonymes"],
            correctIndex: 2
        },
        {
            question: "Prendre des notes pour un collègue malade en sémiologie et les lui envoyer est :",
            options: ["A. Un exemple bénin de partage individuel", "B. Du plagiat", "C. Auto-plagiat", "D. Une fraude contractuelle", "E. Du salami-slicing"],
            correctIndex: 0
        },
        {
            question: "Envoyer par e-mail son ancien travail à un collègue qui l'« adapte » et le rend maintenant :",
            options: ["A. C'est de l'altruisme, sans risque", "B. Seul le destinataire est responsable", "C. Les deux sont responsables : c'est du plagiat", "D. Il s'agit seulement d'une recommandation de lecture", "E. C'est une utilisation équitable entre collègues"],
            correctIndex: 2
        },
        {
            question: "Un groupe fermé distribue des « QCM résolues », des sujets et des réponses aux examens passés. D'un point de vue éthique, cela :",
            options: ["A. Ne pose aucun problème", "B. Est toujours légal", "C. Peut être contraire à l'éthique ; encourage la tricherie", "D. N'est qu'une solution de secours", "E. Devient de la recherche"],
            correctIndex: 2
        },
        {
            question: "Sites ouverts tels que LibGen/Sci-Hub :",
            options: ["A. Sont identiques à des fraudes", "B. Ne peuvent jamais être utilisés de manière éthique", "C. Font partie d'un mouvement d'accès libre, avec des motivations éthiques complexes ; le téléchargement ne justifie pas le plagiat", "D. Ils garantissent l'originalité", "E. Ils remplacent les citations"],
            correctIndex: 2
        },
        {
            question: "Comment protégez-vous votre travail lorsque vous ressentez la pression de le partager ?",
            options: ["A. Vous l'envoyez dans son intégralité au groupe", "B. Vous le téléchargez sur des plateformes commerciales", "C. Vous partagez de petites sections/vous floutez certaines parties avant de les partager", "D. Vous abandonnez le projet", "E. Vous le publiez"],
            correctIndex: 2
        },
        {
            question: "« Fraude contractuelle » signifie :",
            options: ["A. Citer de manière erronée", "B. Acheter/engager quelqu'un pour faire votre travail ou vous remplacer à l'examen", "C. Paraphraser de manière incorrecte", "D. Refaire son propre travail", "E. Travailler en équipe"],
            correctIndex: 1
        },
        {
            question: "La différence entre les « facilitateurs » et les « fournisseurs » dans la fraude contractuelle est la suivante :",
            options: ["A. Les facilitateurs sont des plateformes, les fournisseurs sont des proches", "B. Les facilitateurs sont des proches (amis/famille), les fournisseurs sont des commerçants (freelances/entreprises)", "C. Les deux sont uniquement des enseignants", "D. Seuls les fournisseurs trichent", "E. Les facilitateurs sont illégaux"],
            correctIndex: 1
        },
        {
            question: "Un signe suggestif pour le travail externalisé :",
            options: ["A. Rédaction générique, trop sophistiquée pour le niveau de l'étudiant", "B. Deux tableaux", "C. Couleur bleue dans l'en-tête", "D. Une seule illustration", "E. Format APA"],
            correctIndex: 0
        },
        {
            question: "Certaines entreprises exigent des « paiements supplémentaires » après avoir remis au client un essai fabriqué, en menaçant de publier l'essai. Cela décrit :",
            options: ["A. Mentorat", "B. Chantage de la part de l'industrie de la tricherie", "C. Une évaluation par les pairs", "D. Correction", "E. Utilisation équitable"],
            correctIndex: 1
        },
        {
            question: "« Ce n'est pas du plagiat, j'ai payé pour cet essai. » Selon le cours :",
            options: ["A. Correct - ce n'est pas du plagiat", "B. Il s'agit simplement d'un service éditorial", "C. C'est de la fraude : la paternité réelle n'appartient pas à l'étudiant", "D. Cela devient légitime si vous mentionnez la facture", "E. C'est du salami-slicing"],
            correctIndex: 2
        },
        {
            question: "Une mesure pratique anti-fraude contractuelle dans un cours clinique :",
            options: ["A. Il suffit d'interdire l'accès à Internet", "B. Demander des esquisses/mini-présentations intermédiaires et de brèves défenses orales du travail", "C. Augmenter le nombre de grilles", "D. Laisser la date limite libre", "E. Interdire la bibliographie"],
            correctIndex: 1
        },
        {
            question: "Un étudiant rédige intégralement son essai à l'aide d'un modèle d'I.A. et le rend sans en indiquer la source. Selon le cours, il est :",

        },
        {
            question: "Dans les travaux générés par l'I.A., on trouve fréquemment :",

        },
        {

        },
        {
            question: "L'assistance éditoriale « zone grise » (correction, résumé) devient une fraude lorsque :",

        {
