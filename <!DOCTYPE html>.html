<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz EIA - UMF Iași</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --correct-color: #28a745;
            --incorrect-color: #dc3545;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
        }

        .question-counter {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--secondary-color);
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--correct-color);
            color: #155724;
        }

        .option-btn.incorrect {
            background-color: #f8d7da;
            border-color: var(--incorrect-color);
            color: #721c24;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        .next-btn:hover {
            background-color: #004494;
        }

        .score-container {
            text-align: center;
            display: none;
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Éthique et Intégrité Académique</h1>
    
    <div id="quiz-block">
        <div class="question-counter" id="question-counter">Question 1 / 102</div>
        <div class="question-text" id="question-text">Chargement...</div>
        <div class="options" id="options-container"></div>
        <div class="controls">
            <div id="feedback-msg" style="font-weight: bold;"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Suivant ➔</button>
        </div>
    </div>

    <div class="score-container" id="score-block">
        <div class="score-text">Score final : <span id="final-score">0</span> / <span id="total-questions">0</span></div>
        <button class="restart-btn" onclick="restartQuiz()">Recommencer l'entraînement</button>
    </div>
</div>

<script>

    let currentQuestionIndex = 0;
    let score = 0;

    const questionCounterEl = document.getElementById("question-counter");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainerEl = document.getElementById("options-container");
    const nextBtnEl = document.getElementById("next-btn");
    const feedbackMsgEl = document.getElementById("feedback-msg");
    const quizBlockEl = document.getElementById("quiz-block");
    const scoreBlockEl = document.getElementById("score-block");
    const finalScoreEl = document.getElementById("final-score");
    const totalScoreEl = document.getElementById("total-questions");

    function loadQuestion() {
        const currentQ = questionsData[currentQuestionIndex];
        questionCounterEl.textContent = `Question ${currentQuestionIndex + 1} / ${questionsData.length}`;
        questionTextEl.textContent = currentQ.question;
        
        optionsContainerEl.innerHTML = "";
        feedbackMsgEl.textContent = "";
        nextBtnEl.style.display = "none";

        currentQ.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.textContent = option;
            button.onclick = () => checkAnswer(index, button);
            optionsContainerEl.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex, selectedButton) {
        const currentQ = questionsData[currentQuestionIndex];
        const buttons = optionsContainerEl.querySelectorAll(".option-btn");
        
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQ.correctIndex) {
            selectedButton.classList.add("correct");
            feedbackMsgEl.textContent = "Correct !";
            feedbackMsgEl.style.color = "var(--correct-color)";
            score++;
        } else {
            selectedButton.classList.add("incorrect");
            buttons[currentQ.correctIndex].classList.add("correct"); 
            feedbackMsgEl.textContent = "Incorrect";
            feedbackMsgEl.style.color = "var(--incorrect-color)";
        }

        nextBtnEl.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questionsData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        quizBlockEl.style.display = "none";
        scoreBlockEl.style.display = "block";
        finalScoreEl.textContent = score;
        totalScoreEl.textContent = questionsData.length;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizBlockEl.style.display = "block";
        scoreBlockEl.style.display = "none";
        loadQuestion();
    }

    loadQuestion();
